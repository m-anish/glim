; glim — ATtiny814 joystick LED dimmer
;
; Build & upload with a serialUPDI programmer (a USB-serial adapter with a
; resistor from TX to the UPDI pin — see docs/hardware.md).
;
;   pio run                         # compile
;   pio run -t upload               # flash via serialUPDI
;   pio run -t fuses -e set_fuses   # set clock/BOD/EESAVE fuses (do once)
;   pio device monitor              # serial console (only if GLIM_DEBUG=1)
;
; Adjust upload_port to match your adapter (ls /dev/cu.* on macOS).

[platformio]
default_envs = ATtiny814

[env]
platform      = atmelmegaavr
framework     = arduino
board         = ATtiny814

; 16 MHz off the internal oscillator — no external crystal needed.
board_build.f_cpu     = 16000000L
board_hardware.oscillator = internal

; Keep saved brightness across reprogramming.
board_hardware.eesave = yes
board_hardware.bod    = 2.7v

monitor_speed = 115200

; upload_port is deliberately not pinned here — utils/flash.sh auto-detects the
; adapter and passes it in. Uncomment to force a specific one.
[env:ATtiny814]
upload_protocol = serialupdi
upload_speed    = 230400
; upload_port   = /dev/cu.usbserial-1440

; Run once to write the fuses (clock source, BOD, EESAVE). Same wiring as upload.
; updipin stays 'updi' — never set this to gpio/reset, it would lock you out.
[env:set_fuses]
upload_protocol        = serialupdi
upload_speed           = 230400
board_hardware.updipin = updi
; upload_port          = /dev/cu.usbserial-1440
